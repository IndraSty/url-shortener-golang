app = "url-shortener-indrasty"
primary_region = "sin"        # Singapore — lowest latency from Indonesia

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV  = "production"
  APP_PORT = "8080"

# HTTP service config
[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = false   # keep always-on for sub-10ms cold start avoidance
  auto_start_machines  = true
  min_machines_running = 1

  # Fly.io health check — must pass before traffic is routed
  [[http_service.checks]]
    grace_period = "10s"
    interval     = "15s"
    method       = "GET"
    path         = "/readyz"
    timeout      = "5s"

# Machine size — shared CPU is enough for redirect workload
[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

# Metrics — Fly.io can scrape Prometheus directly
[metrics]
  port = 8080
  path = "/metrics"