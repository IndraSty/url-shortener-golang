app = "url-shortener-indrasty"
primary_region = "sin" # Singapore — closest to Indonesia

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  APP_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1